<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>En Mantenimiento — Laura Q Spa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary:       #e74266;
      --primary-dark:  #c92e52;
      --primary-light: #f5a5b5;
      --primary-pale:  #fde8ed;
      --accent:        #3d2b3d;
      --gold:          #c9a96e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Jost', sans-serif;
      background: #fdf5f7;
      color: #3d2b3d;
      overflow: hidden;
    }

    /* ---- BACKGROUND DECORATION ---- */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: float-blob 8s ease-in-out infinite alternate;
    }
    .bg-blob:nth-child(1) {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #f5a5b5, transparent 70%);
      top: -200px; left: -150px;
      animation-duration: 9s;
    }
    .bg-blob:nth-child(2) {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #e74266, transparent 70%);
      bottom: -180px; right: -120px;
      animation-duration: 11s;
      animation-delay: -4s;
    }
    .bg-blob:nth-child(3) {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #c9a96e, transparent 70%);
      top: 40%; left: 55%;
      animation-duration: 13s;
      animation-delay: -2s;
      opacity: 0.18;
    }

    @keyframes float-blob {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* Petal / diamond decorative lines */
    .bg-lines {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(
          135deg,
          rgba(231,66,102,0.04) 0px,
          rgba(231,66,102,0.04) 1px,
          transparent 1px,
          transparent 60px
        );
    }

    /* ---- MAIN LAYOUT ---- */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    /* ---- LOGO AREA ---- */
    .logo-mark {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 10vw, 5.5rem);
      font-weight: 300;
      letter-spacing: 10px;
      color: var(--primary);
      line-height: 1;
      animation: fade-in-down 0.9s ease both;
    }
    .logo-subtitle {
      font-family: 'Jost', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 6px;
      animation: fade-in-down 0.9s ease 0.1s both;
    }

    /* ---- DIVIDER ---- */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 28px auto;
      width: min(340px, 100%);
      animation: fade-in 0.9s ease 0.25s both;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--primary-light), transparent);
    }
    .divider-diamond {
      width: 7px; height: 7px;
      background: var(--primary);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ---- HEADLINE ---- */
    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 6vw, 3.2rem);
      font-weight: 400;
      font-style: italic;
      color: var(--accent);
      line-height: 1.2;
      margin-bottom: 16px;
      animation: fade-in-up 0.9s ease 0.3s both;
    }

    .subtext {
      font-size: 0.95rem;
      font-weight: 300;
      color: #7a5a6e;
      line-height: 1.8;
      max-width: 420px;
      margin: 0 auto 36px;
      animation: fade-in-up 0.9s ease 0.4s both;
    }

    /* ---- PROGRESS BAR ---- */
    .progress-wrap {
      width: min(360px, 100%);
      margin: 0 auto 32px;
      animation: fade-in-up 0.9s ease 0.5s both;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 10px;
    }
    .progress-track {
      width: 100%;
      height: 3px;
      background: var(--primary-pale);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(to right, var(--primary-light), var(--primary));
      border-radius: 999px;
      animation: fill-progress 3s cubic-bezier(0.4, 0, 0.2, 1) 0.8s forwards;
    }

    @keyframes fill-progress {
      to { width: 75%; }
    }

    /* ---- CONTACT PILLS ---- */
    .contact-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 32px;
      animation: fade-in-up 0.9s ease 0.6s both;
    }

    .contact-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.5px;
      text-decoration: none;
      border: 1.5px solid;
      transition: all 0.25s ease;
    }
    .contact-pill--wsp {
      border-color: var(--primary-light);
      color: var(--primary-dark);
      background: rgba(255,255,255,0.7);
    }
    .contact-pill--wsp:hover {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(231,66,102,0.3);
    }
    .contact-pill--ig {
      border-color: #f0d9df;
      color: var(--accent);
      background: rgba(255,255,255,0.7);
    }
    .contact-pill--ig:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(61,43,61,0.2);
    }

    .pill-icon {
      font-size: 1rem;
      line-height: 1;
    }

    /* ---- FOOTER NOTE ---- */
    .footer-note {
      font-size: 0.72rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #b8909e;
      animation: fade-in 1s ease 1s both;
    }

    /* ---- FLOATING PETALS ---- */
    .petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .petal {
      position: absolute;
      width: 8px; height: 10px;
      border-radius: 50% 0 50% 0;
      background: var(--primary-light);
      opacity: 0;
      animation: fall linear infinite;
    }
    .petal:nth-child(1)  { left: 10%; animation-duration: 12s; animation-delay: 0s;    width:6px;  height:8px;  background: #f7bfcb; }
    .petal:nth-child(2)  { left: 22%; animation-duration: 9s;  animation-delay: 2s;    width:9px;  height:12px; background: #e74266; opacity:0; }
    .petal:nth-child(3)  { left: 38%; animation-duration: 14s; animation-delay: 5s;    width:5px;  height:7px;  background: #fde8ed; }
    .petal:nth-child(4)  { left: 55%; animation-duration: 10s; animation-delay: 1s;    width:10px; height:13px; background: #f5a5b5; }
    .petal:nth-child(5)  { left: 70%; animation-duration: 11s; animation-delay: 3.5s;  width:6px;  height:8px;  background: #c9a96e; opacity:0; }
    .petal:nth-child(6)  { left: 83%; animation-duration: 13s; animation-delay: 0.5s;  width:8px;  height:11px; background: #f7bfcb; }
    .petal:nth-child(7)  { left: 92%; animation-duration: 8s;  animation-delay: 4s;    width:5px;  height:6px;  background: #e74266; opacity:0; }
    .petal:nth-child(8)  { left: 5%;  animation-duration: 15s; animation-delay: 7s;    width:7px;  height:9px;  background: #fde8ed; }

    @keyframes fall {
      0%   { transform: translateY(-40px) rotate(0deg);   opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
    }

    /* ---- KEYFRAMES ---- */
    @keyframes fade-in-down {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 480px) {
      .contact-row { flex-direction: column; align-items: center; }
      .contact-pill { width: 220px; justify-content: center; }
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="bg-layer">
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-lines"></div>
  </div>

  <!-- Floating petals -->
  <div class="petals" aria-hidden="true">
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
    <div class="petal"></div>
  </div>

  <!-- Main content -->
  <main class="page">

    <!-- Logo -->
    <div class="logo-mark">LQ</div>
    <div class="logo-subtitle">Laura Q Spa</div>

    <!-- Divider -->
    <div class="divider" aria-hidden="true">
      <div class="divider-line"></div>
      <div class="divider-diamond"></div>
      <div class="divider-line"></div>
    </div>

    <!-- Headline -->
    <h1 class="headline">Estamos mejorando<br>para ti</h1>

    <p class="subtext">
      Nuestro sitio se encuentra en mantenimiento mientras preparamos algo aún más especial.
      Pronto estaremos de vuelta con toda nuestra esencia.
    </p>

    <!-- Progress -->
    <div class="progress-wrap" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100" aria-label="Progreso del sitio">
      <div class="progress-label">
        <span>En progreso</span>
        <span>Muy pronto</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill"></div>
      </div>
    </div>

    <!-- Contact -->
    <div class="contact-row">
      <a class="contact-pill contact-pill--wsp"
         href="https://wa.me/573147388239"
         target="_blank" rel="noopener"
         aria-label="Contactar por WhatsApp">
        <span class="pill-icon">💬</span>
        WhatsApp
      </a>
      <a class="contact-pill contact-pill--ig"
         href="https://www.instagram.com/lauraq_spa/"
         target="_blank" rel="noopener"
         aria-label="Ver Instagram de Laura Q Spa">
        <span class="pill-icon">✦</span>
        @lauraq_spa
      </a>
    </div>

    <p class="footer-note">La América · Medellín, Colombia</p>

  </main>

</body>
</html>
